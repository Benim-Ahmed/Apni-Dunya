<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Form</title>
    <link rel="stylesheet" href="Style/Payment_form.CSS" />
  </head>
  <body>
    <div class="container">
      <form action="" method="get">
        <h1 class="main_heading">Payment Form</h1>
        <hr>
        <p>Required Fields are followed by &nbsp;*</p>
        <hr>
        <h2>Contact Information</h2>
        <p>
          Name: *
          <input type="text" name="name" required placeholder="Your Name" />
        </p>
        <fieldset>
          <legend>Gender *</legend>
          <p>
            Male<input type="radio" name="gender" id="male" required>
            Female<input type="radio" name="gender" id="female" required>
          </p>
        </fieldset>
        <p>
          Address:
          <textarea name="address" id="address" cols="100" rows="8" placeholder="Enter Your Address Here"></textarea>
        </p>
        <p>
          Email: *
          <input type="email" name="Email" id="email" size="30" required placeholder="user@gmail.com">
        </p>
        <p>
          Pincode: *
          <input type="number" name="pincode" id="pincode" required placeholder="12345">
        </p>

        <h2>Payment Information</h2>
        <p>
          Card Type: *
          <select name="card_type" id="card_type" required>
            <option value="">--Select a Card Type--</option>
            <option value="Visa">Visa</option>
            <option value="Nayapay">Nayapay</option>
            <option value="Easypaisa">Easypaisa</option>
            <option value="JazzCash">JazzCash</option>
          </select>
        </p>
        <p>
          Card Number: *
          <input type="number" name="card_number" id="card_number" required placeholder="1111 2222 3333 4444">
        </p>
        <p>
          Expiry Date: *
          <input type="date" name="exp_date" id="exp_date" required>
        </p>
        <p>
          CVV: *
          <input type="password" name="cvv" id="cvv" required placeholder="123">
        </p>
        <div class="buttonContainer">
          <input type="submit" value="Pay Now">
        </div>
      </form>
    </div>
  </body>
</html>
