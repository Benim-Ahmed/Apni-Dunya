            name="Password"
            placeholder="Enter Password"

        <p id="loginButton"><input type="submit" value="Login" /></p>
        <br />
        <br />

          &nbsp;&nbsp;&nbsp;&nbsp;

            ><a href="Signup_Form.html">Not Registered? Signup here</a></small

        <br />
