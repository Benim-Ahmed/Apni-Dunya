<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apni Dunya | Signup</title>
    <link rel="stylesheet" href="Style/Signup.css" />
    <link
      rel="website icon"
      type="png"
      href="Assets/icons/Visigraph logo.png"
    />
  </head>
  <body>
    <header>
      <h1>Apni Dunya</h1>
    </header>
    <nav>
      <a href="index.html">Home</a>
      <a href="#">College Reviews</a>
      <a href="Courses.html">Courses</a>
      <a href="#">Study Material</a>
      <a href="Contact_form.html">Contact Us</a>
      <a href="Login_Form.html">Login/Signup</a>
    </nav>
    <main>
      <form action="" method="get">
        <h2 class="signupTitle">Signup</h2>
        <h4 class="subTitle">Name:</h4>
        <p>
          <input type="name" name="fName" placeholder="First Name" required />
        </p>
        <p>
          <input type="name" name="lName" placeholder="Last Name" required />
        </p>
        <fieldset>
          <legend class="subTitle" id="gender">Gender:</legend>
          <p id="checkbox">
            <input type="radio" name="gender" id="male" required /> Male
            <br />
            <input type="radio" name="gender" id="female" required /> Female
            <br />
            <input type="radio" name="gender" id="others" required /> Others
          </p>
        </fieldset>
        <h4 class="subTitle">Age:</h4>
        <p>
          <input type="number" name="age" placeholder="Age is years" required />
        </p>
        <h4 class="subTitle">Residential Address:</h4>
        <p>
          <textarea
            name="address"
            id="address"
            placeholder="Current Residential Address"
            rows="5"
            cols="50"
          ></textarea>
        </p>
        <h4 class="subTitle">Email:</h4>
        <p>
          <input
            type="email"
            name="Email"
            placeholder="abc@gmail.com"
            required
          />
        </p>
        <h4 class="subTitle">Password:</h4>
        <p>
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </p>
        <p>
          <input
            type="password"
            name="ConfirmPassword"
            placeholder="Confirm Password"
            required
          />
        </p>
        <p><input type="submit" value="Register Now!" /></p>
      </form>
    </main>
    <footer>
      <a href="#">FAQ</a>
      <a href="#">Terms and Conditions</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Refund Policy</a>
      <a href="#" class="copyright">&copy; 2026 | Apni Dunya</a>
    </footer>
  </body>
</html>
