<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apni Dunya | Contact</title>
    <link rel="stylesheet" href="Style/Contact_form.css" />
    <link
      rel="website icon"
      type="png"
      href="Assets/icons/Visigraph logo.png"
    />
  </head>
  <body>
    <header>
      <h1>Apni Dunya</h1>
    </header>
    <nav>
      <a href="index.html" class="navBtn">Home</a>
      <a href="#" class="navBtn">College Reviews</a>
      <a href="Courses.html" class="navBtn">Courses</a>
      <a href="#" class="navBtn">Study Material</a>
      <a href="Contact_form.html" class="navBtn">Contact Us</a>
      <a href="Login_Form.html" class="navBtn login">Login/Signup</a>
    </nav>
    <main>
      <div>
        <form action="" method="get">
          <div class="contact">
            <h1>Contact Us</h1>
          </div>
          <div class="container">
            <h2 class="Query"><span>Send Us Your Query</span></h2>
            <p>
              <input
                type="text"
                name="First ame"
                placeholder="Your First Name *"
                required
              />
            </p>
            <p>
              <input
                type="text"
                name="Last name"
                placeholder="Your Last Name *"
                required
              />
            </p>
            <p>
              <input
                type="text"
                name="Mobile"
                placeholder="Your Mobile number *"
                required
              />
            </p>
            <p>
              <input
                type="email"
                name="Email"
                placeholder="Your Email *"
                required
              />
            </p>
            <p>
              <select name="Query" id="Query" required>
                <option value="--Query Related to--">
                  --Query Related to-- *
                </option>
                <option value="Videos">Videos</option>
                <option value="Shorts">Shorts</option>
                <option value="Islamic Quiz">Islamic Quiz</option>
                <option value="Signin/Signup">Signin/Signup</option>
              </select>
            </p>
            <p>
              <input
                type="text"
                name="Subject"
                placeholder="Type Your Subject/Reference Here *"
              />
            </p>
            <p>
              <textarea
                name="Details"
                id="Details"
                rows="10"
                cols="100"
                placeholder="Details Here"
              ></textarea>
            </p>
            <div class="button">
              <p><input type="submit" /></p>
            </div>
          </div>
        </form>
      </div>
    </main>
    <footer>
      <a href="#" class="footBtn">FAQ</a>
      <a href="#" class="footBtn">Terms and Condition</a>
      <a href="#" class="footBtn">Privacy Policy</a>
      <a href="#" class="footBtn">Refund Policy</a>
      <a href="#" class="footBtn copyright">&copy; 2026 | Apni Dunya</a>
    </footer>
  </body>
</html>
